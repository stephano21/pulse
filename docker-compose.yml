# Pulse API + PostgreSQL (todo en contenedores).
#
# Uso:
#   docker compose up --build
# API:  http://localhost:8080   Swagger: http://localhost:8080/swagger
# Postgres: localhost:5432  (usuario pulse / ver POSTGRES_PASSWORD)
# Mailpit (correo de prueba): UI http://localhost:8025  SMTP localhost:1025

services:
  mailpit:
    image: axllent/mailpit
    container_name: pulse-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  postgres:
    image: postgres:17-alpine
    container_name: pulse-postgres
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse_dev_2026
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes:
      - pulse_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulse-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=pulse;Username=pulse;Password=pulse_dev_2026"
      Jwt__Issuer: pulse
      Jwt__Audience: yapa
      JWTKey: "docker-dev-signing-key-at-least-32-characters-long!!"
      App__PublicBaseUrl: "http://localhost:8080"
      # Mismo Client ID que "Aplicación web" en Google Cloud (audience del id_token). Vacío => POST /v1/auth/google responde 503.
      Authentication__Google__ClientId: ""
      Email__Host: "mailpit"
      Email__Port: "1025"
      Email__FromAddress: "noreply@pulse.local"
      Email__FromName: "Pulse"
      Email__SslMode: "None"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

volumes:
  pulse_pg_data:
