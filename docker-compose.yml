# Pulse API + SQL Server (todo en contenedores; no hace falta LocalDB ni SDK en el host salvo para desarrollar fuera de Docker).
#
# Uso:
#   docker compose up --build
# API:  http://localhost:8080   Swagger: http://localhost:8080/swagger
# SQL:  localhost,1433  (sa / ver MSSQL_SA_PASSWORD abajo)
#
# Mac Apple Silicon: si el contenedor de SQL falla, descomenta "platform: linux/amd64" en el servicio sql.

services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pulse-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Pulse_docker_dev_2026!"
    ports:
      - "1433:1433"
    volumes:
      - pulse_sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 25s
    # platform: linux/amd64

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulse-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Server=sql;Database=Pulse;User Id=sa;Password=Pulse_docker_dev_2026!;TrustServerCertificate=True;MultipleActiveResultSets=true"
      Jwt__Issuer: pulse
      Jwt__Audience: yapa
      Jwt__SigningKey: "docker-dev-signing-key-at-least-32-characters-long!!"
      App__PublicBaseUrl: "http://localhost:8080"
      Authentication__Google__ClientId: ""
    depends_on:
      sql:
        condition: service_healthy

volumes:
  pulse_sql_data:
